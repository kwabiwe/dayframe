<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Dayframe colourful logo</title>
  <desc id="desc">Six rounded geometric blocks forming the Dayframe app logo.</desc>
  <rect width="1024" height="1024" fill="#FFFFFF"/>
  <defs>
    <linearGradient id="grey" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DDE0E8"/>
      <stop offset="100%" stop-color="#BFC3CF"/>
    </linearGradient>
    <linearGradient id="purple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7B3DFF"/>
      <stop offset="100%" stop-color="#8B20F8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00CFA8"/>
      <stop offset="100%" stop-color="#18E6BD"/>
    </linearGradient>
    <linearGradient id="coral" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6249"/>
      <stop offset="100%" stop-color="#FF4B33"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB400"/>
      <stop offset="100%" stop-color="#FFC62A"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2388F5"/>
      <stop offset="100%" stop-color="#3D96F6"/>
    </linearGradient>
  </defs>

  <rect x="170" y="145" width="195" height="285" rx="30" fill="url(#grey)"/>
  <rect x="170" y="465" width="195" height="365" rx="30" fill="url(#purple)"/>
  <rect x="400" y="145" width="195" height="685" rx="30" fill="url(#green)"/>
  <rect x="630" y="145" width="195" height="285" rx="30" fill="url(#coral)"/>
  <rect x="630" y="455" width="195" height="130" rx="30" fill="url(#amber)"/>
  <rect x="630" y="615" width="195" height="215" rx="30" fill="url(#blue)"/>
</svg>
